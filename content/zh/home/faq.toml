eyebrow = "常见问题"
title = "常见问题"
description = "如果你有疑问，可以先看这里。"

[[items]]
icon = "faq"
question = "支持哪些语言？"
answer = "和 iAssets 一致：中文简体、中文繁体台湾、中文繁体香港、中文繁体澳门、中文繁体新加坡、English、日本語、한국어。"

[[items]]
icon = "faq"
question = "支持离线使用吗？"
answer = "支持。无网络也可新增和编辑，联网后按策略同步。"

[[items]]
icon = "faq"
question = "数据存在哪里？"
answer = "默认本地存储，可按需开启 iCloud 同步。"

[[items]]
icon = "faq"
question = "可以多人协作吗？"
answer = "可以。开启家庭模式即可管理成员和共享账本。"

[[items]]
icon = "faq"
question = "Android 可用吗？"
answer = "目前主要面向 Apple 生态。"

[[items]]
icon = "faq"
question = "如何开始？"
answer = "下载应用后创建第一个账本，即可开始记录。"
