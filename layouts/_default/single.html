{{ define "main" }}
<main class="legal-main">
  <section class="section">
    <div class="container legal-wrap">
      <p class="eyebrow" data-i18n="{{ .Params.pageKey }}Eyebrow">{{ T (printf "%sEyebrow" .Params.pageKey) }}</p>
      <h1 class="legal-title">{{ .Title }}</h1>
      <div class="legal-head-row"><p class="legal-updated" data-i18n="legalUpdated">{{ T "legalUpdated" }}</p></div>
      <article class="legal-article">
        {{ .Content }}
      </article>
    </div>
  </section>
</main>
{{ end }}
