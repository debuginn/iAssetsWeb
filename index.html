<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iAssets</title>
    <meta name="description" content="iAssets - 快速掌握家庭资产全景。" />
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
    <link rel="shortcut icon" href="./assets/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav-shell">
        <nav class="top-pill">
          <div class="pill-left">
            <a class="logo" href="#">
              <img class="logo-mark" src="./assets/logo.svg" alt="iAssets logo" />
              <span data-i18n="brand"></span>
            </a>
            <div class="desktop-nav">
              <a href="#features" data-i18n="navFeatures"></a>
              <a href="#reviews" data-i18n="navReviews"></a>
              <a href="#pricing" data-i18n="navPricing"></a>
              <a href="#faqs" data-i18n="navFaq"></a>
            </div>
          </div>
          <div class="pill-right">
            <button class="mode-btn" type="button" aria-label="Switch theme">◐</button>
            <button class="menu-btn" type="button" aria-label="Open menu" aria-controls="mobile-menu" aria-expanded="false">☰</button>
            <a class="btn btn-solid" href="#download" data-i18n="navDownload"></a>
          </div>
        </nav>
        <nav id="mobile-menu" class="mobile-menu" aria-hidden="true">
          <a href="#features" data-i18n="navFeatures"></a>
          <a href="#reviews" data-i18n="navReviews"></a>
          <a href="#pricing" data-i18n="navPricing"></a>
          <a href="#faqs" data-i18n="navFaq"></a>
          <a href="#download" data-i18n="navDownload"></a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero section">
        <div class="container hero-grid">
          <div class="hero-copy">
            <p class="eyebrow" data-i18n="heroEyebrow"></p>
            <h1 data-i18n="heroTitle"></h1>
            <p class="hero-desc" data-i18n="heroDesc"></p>
            <div class="hero-cta-row">
              <a class="btn btn-solid" href="#download" data-i18n="heroCta"></a>
            </div>
            <div class="hero-mini-cards">
              <article class="mini-card">
                <div class="mini-top"><span>◉</span><strong>01</strong></div>
                <h3 data-i18n="heroCard1Title"></h3>
                <p data-i18n="heroCard1Desc"></p>
              </article>
              <article class="mini-card">
                <div class="mini-top"><span>◉</span><strong>02</strong></div>
                <h3 data-i18n="heroCard2Title"></h3>
                <p data-i18n="heroCard2Desc"></p>
              </article>
              <article class="mini-card">
                <div class="mini-top"><span>◉</span><strong>03</strong></div>
                <h3 data-i18n="heroCard3Title"></h3>
                <p data-i18n="heroCard3Desc"></p>
              </article>
            </div>
          </div>
          <div class="hero-visual">
            <div class="phone-frame">
              <div class="phone-head"></div>
              <div class="phone-content">
                <div class="metric">
                  <span data-i18n="totalAssets"></span>
                  <strong>¥2,468,000</strong>
                </div>
                <div class="metric-grid">
                  <div><span data-i18n="netAssets"></span><strong>¥1,980,000</strong></div>
                  <div><span data-i18n="liabilities"></span><strong>¥488,000</strong></div>
                  <div><span data-i18n="trend"></span><strong>+12%</strong></div>
                  <div><span data-i18n="members"></span><strong>4</strong></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="features" class="section">
        <div class="container">
          <p class="eyebrow" data-i18n="featuresEyebrow"></p>
          <h2 class="section-title" data-i18n="featuresTitle"></h2>
          <p class="section-desc" data-i18n="featuresDesc"></p>
          <div class="features-layout">
            <div class="feature-list">
              <article class="feature-item"><div class="mini-top"><span>◉</span><strong>01</strong></div><h3 data-i18n="f1t"></h3><p data-i18n="f1d"></p></article>
              <article class="feature-item"><div class="mini-top"><span>◉</span><strong>02</strong></div><h3 data-i18n="f2t"></h3><p data-i18n="f2d"></p></article>
              <article class="feature-item"><div class="mini-top"><span>◉</span><strong>03</strong></div><h3 data-i18n="f3t"></h3><p data-i18n="f3d"></p></article>
              <article class="feature-item"><div class="mini-top"><span>◉</span><strong>04</strong></div><h3 data-i18n="f4t"></h3><p data-i18n="f4d"></p></article>
              <article class="feature-item"><div class="mini-top"><span>◉</span><strong>05</strong></div><h3 data-i18n="f5t"></h3><p data-i18n="f5d"></p></article>
              <article class="feature-item"><div class="mini-top"><span>◉</span><strong>06</strong></div><h3 data-i18n="f6t"></h3><p data-i18n="f6d"></p></article>
            </div>
            <aside class="feature-showcase">
              <div class="showbox big"></div>
              <div class="showbox mid"></div>
              <div class="showbox small"></div>
            </aside>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="container">
          <p class="eyebrow" data-i18n="detailsEyebrow"></p>
          <h2 class="section-title" data-i18n="detailsTitle"></h2>
          <p class="section-desc" data-i18n="detailsDesc"></p>
          <div class="detail-grid">
            <article class="detail-card"><h3 data-i18n="d1t"></h3><p data-i18n="d1d"></p></article>
            <article class="detail-card"><h3 data-i18n="d2t"></h3><p data-i18n="d2d"></p></article>
            <article class="detail-card"><h3 data-i18n="d3t"></h3><p data-i18n="d3d"></p></article>
            <article class="detail-card"><h3 data-i18n="d4t"></h3><p data-i18n="d4d"></p></article>
            <article class="detail-card"><h3 data-i18n="d5t"></h3><p data-i18n="d5d"></p></article>
            <article class="detail-card"><h3 data-i18n="d6t"></h3><p data-i18n="d6d"></p></article>
          </div>
        </div>
      </section>

      <section id="download" class="section">
        <div class="container">
          <div class="cta-box">
            <p class="eyebrow" data-i18n="downloadEyebrow"></p>
            <h2 data-i18n="downloadTitle"></h2>
            <p data-i18n="downloadDesc"></p>
            <a class="btn btn-solid" href="#" data-i18n="downloadBtn"></a>
          </div>
        </div>
      </section>

      <section id="reviews" class="section">
        <div class="container">
          <p class="eyebrow" data-i18n="reviewsEyebrow"></p>
          <h2 class="section-title" data-i18n="reviewsTitle"></h2>
          <p class="section-desc" data-i18n="reviewsDesc"></p>
          <div class="review-grid">
            <figure class="review"><div class="stars">★★★★★</div><blockquote data-i18n="r1"></blockquote><figcaption>- Lin</figcaption></figure>
            <figure class="review"><div class="stars">★★★★★</div><blockquote data-i18n="r2"></blockquote><figcaption>- Minji</figcaption></figure>
            <figure class="review"><div class="stars">★★★★★</div><blockquote data-i18n="r3"></blockquote><figcaption>- Yuta</figcaption></figure>
            <figure class="review"><div class="stars">★★★★★</div><blockquote data-i18n="r4"></blockquote><figcaption>- Alex</figcaption></figure>
            <figure class="review"><div class="stars">★★★★★</div><blockquote data-i18n="r5"></blockquote><figcaption>- Zoe</figcaption></figure>
            <figure class="review"><div class="stars">★★★★★</div><blockquote data-i18n="r6"></blockquote><figcaption>- Chen</figcaption></figure>
          </div>
        </div>
      </section>

      <section id="pricing" class="section">
        <div class="container">
          <p class="eyebrow" data-i18n="pricingEyebrow"></p>
          <h2 class="section-title" data-i18n="pricingTitle"></h2>
          <p class="section-desc" data-i18n="pricingDesc"></p>
          <div class="billing-switch"><button class="on" data-i18n="monthly"></button><button data-i18n="yearly"></button></div>
          <div class="pricing-grid">
            <article class="price-card">
              <h3>Free</h3><p class="price"><span data-i18n="currency"></span>0</p><p data-i18n="p1d"></p>
              <ul><li data-i18n="p1f1"></li><li data-i18n="p1f2"></li></ul>
              <a class="btn btn-ghost" href="#download" data-i18n="p1cta"></a>
            </article>
            <article class="price-card featured">
              <span class="badge" data-i18n="popular"></span>
              <h3>Premium</h3><p class="price"><span data-i18n="currency"></span>15<span>/mo</span></p><p data-i18n="p2d"></p>
              <ul><li data-i18n="p2f1"></li><li data-i18n="p2f2"></li><li data-i18n="p2f3"></li></ul>
              <a class="btn btn-solid" href="#download" data-i18n="p2cta"></a>
            </article>
            <article class="price-card">
              <h3>Lifetime</h3><p class="price"><span data-i18n="currency"></span>328</p><p data-i18n="p3d"></p>
              <ul><li data-i18n="p3f1"></li><li data-i18n="p3f2"></li><li data-i18n="p3f3"></li></ul>
              <a class="btn btn-ghost" href="#download" data-i18n="p3cta"></a>
            </article>
          </div>
        </div>
      </section>

      <section id="faqs" class="section">
        <div class="container">
          <p class="eyebrow" data-i18n="faqEyebrow"></p>
          <h2 class="section-title" data-i18n="faqTitle"></h2>
          <p class="section-desc" data-i18n="faqDesc"></p>
          <div class="faq-grid">
            <article><h3 data-i18n="q1"></h3><p data-i18n="a1"></p></article>
            <article><h3 data-i18n="q2"></h3><p data-i18n="a2"></p></article>
            <article><h3 data-i18n="q3"></h3><p data-i18n="a3"></p></article>
            <article><h3 data-i18n="q4"></h3><p data-i18n="a4"></p></article>
            <article><h3 data-i18n="q5"></h3><p data-i18n="a5"></p></article>
            <article><h3 data-i18n="q6"></h3><p data-i18n="a6"></p></article>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-card">
          <div class="footer-main">
            <section class="footer-brand-col">
              <a class="logo" href="#"><img class="logo-mark" src="./assets/logo.svg" alt="iAssets logo" /><span data-i18n="brand"></span></a>
              <p class="footer-tag" data-i18n="footerTag"></p>
            </section>
            <nav class="footer-col">
              <h4 data-i18n="footerLinks"></h4>
              <a href="#features" data-i18n="navFeatures"></a>
              <a href="#pricing" data-i18n="navPricing"></a>
              <a href="#faqs" data-i18n="navFaq"></a>
            </nav>
            <section class="qr-box">
              <div class="fake-qr"></div>
              <p data-i18n="downloadHint"></p>
            </section>
          </div>
          <div class="footer-bottom">
            <div class="lang-links">
              <button class="lang-pill" type="button" data-lang="en">English</button>
              <button class="lang-pill" type="button" data-lang="zh-Hans">中文</button>
              <button class="lang-pill" type="button" data-lang="ja">日本語</button>
              <button class="lang-pill" type="button" data-lang="ko">한국어</button>
              <button class="lang-pill" type="button" data-lang="zh-Hant">繁體中文</button>
            </div>
            <p>© Copyright 2026. All rights reserved.</p>
          </div>
        </div>
      </div>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
